name: Build Cross-Platform Binaries

on:
  push:
    branches:
      - dev

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout dev branch
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build executable with PyInstaller
        run: |
          pyinstaller --onefile --add-data "bin/pandoc.exe;bin" --add-data "bin/tidy.exe;bin" --add-data "bin/typst.exe;bin" references/convert_md.py

      - name: Rename output binary
        run: |
          mv dist/convert_md.exe dist/convert_md_win.exe

      - name: Upload Windows Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-bin
          path: dist/convert_md_win.exe

  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - name: Checkout dev branch
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Tidy via Homebrew
        run: brew install tidy-html5

      - name: Stage binaries
        run: |
          mkdir -p bin_temp
          cp bin/pandoc-mac-arm64 bin_temp/pandoc
          cp bin/typst-mac-arm64 bin_temp/typst
          cp $(which tidy) bin_temp/tidy
          chmod +x bin_temp/*

      - name: Build executable with PyInstaller
        run: |
          pyinstaller --onefile --add-data "bin_temp/pandoc:bin" --add-data "bin_temp/typst:bin" --add-data "bin_temp/tidy:bin" references/convert_md.py

      - name: Rename output binary
        run: |
          mv dist/convert_md dist/convert_md_mac_arm64

      - name: Upload macOS ARM64 Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-bin
          path: dist/convert_md_mac_arm64

  build-macos-x86_64:
    runs-on: macos-13
    steps:
      - name: Checkout dev branch
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Tidy via Homebrew
        run: brew install tidy-html5

      - name: Stage binaries
        run: |
          mkdir -p bin_temp
          cp bin/pandoc-mac-x86_64 bin_temp/pandoc
          cp bin/typst-mac-x86_64 bin_temp/typst
          cp $(which tidy) bin_temp/tidy
          chmod +x bin_temp/*

      - name: Build executable with PyInstaller
        run: |
          pyinstaller --onefile --add-data "bin_temp/pandoc:bin" --add-data "bin_temp/typst:bin" --add-data "bin_temp/tidy:bin" references/convert_md.py

      - name: Rename output binary
        run: |
          mv dist/convert_md dist/convert_md_mac_x86_64

      - name: Upload macOS x86_64 Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-x86_64-bin
          path: dist/convert_md_mac_x86_64

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dev branch
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Tidy via apt
        run: |
          sudo apt-get update
          sudo apt-get install -y tidy

      - name: Download Pandoc and Typst static binaries
        run: |
          mkdir -p bin_temp
          
          # Download Pandoc (Linux amd64)
          curl -L -o pandoc.tar.gz https://github.com/jgm/pandoc/releases/download/3.1.11.1/pandoc-3.1.11.1-linux-amd64.tar.gz
          tar -xzf pandoc.tar.gz
          cp pandoc-3.1.11.1/bin/pandoc bin_temp/pandoc
          
          # Download Typst (Linux amd64)
          curl -L -o typst.tar.xz https://github.com/typst/typst/releases/download/v0.11.0/typst-x86_64-unknown-linux-musl.tar.xz
          tar -xJf typst.tar.xz
          cp typst-x86_64-unknown-linux-musl/typst bin_temp/typst
          
          # Copy Tidy
          cp /usr/bin/tidy bin_temp/tidy
          
          chmod +x bin_temp/*

      - name: Build executable with PyInstaller
        run: |
          pyinstaller --onefile --add-data "bin_temp/pandoc:bin" --add-data "bin_temp/typst:bin" --add-data "bin_temp/tidy:bin" references/convert_md.py

      - name: Rename output binary
        run: |
          mv dist/convert_md dist/convert_md_linux

      - name: Upload Linux Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-bin
          path: dist/convert_md_linux

  commit-and-cleanup:
    needs: [build-windows, build-macos-arm64, build-macos-x86_64, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Download Windows Binary
        uses: actions/download-artifact@v4
        with:
          name: windows-bin
          path: artifacts-temp/windows-bin

      - name: Download macOS ARM64 Binary
        uses: actions/download-artifact@v4
        with:
          name: macos-arm64-bin
          path: artifacts-temp/macos-arm64-bin

      - name: Download macOS x86_64 Binary
        uses: actions/download-artifact@v4
        with:
          name: macos-x86_64-bin
          path: artifacts-temp/macos-x86_64-bin

      - name: Download Linux Binary
        uses: actions/download-artifact@v4
        with:
          name: linux-bin
          path: artifacts-temp/linux-bin

      - name: Configure Git and Git LFS
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git lfs install

      - name: Update binaries and remove source files
        run: |
          # Recreate bin folder if it doesn't exist
          mkdir -p bin
          
          # Clean out old executable and mac staging installer from bin to save space
          rm -f bin/convert_md.exe
          rm -f bin/convert_md_mac
          rm -f bin/tidy-5.8.0-macos.pkg
          
          # Copy new binaries to bin/ folder
          cp artifacts-temp/windows-bin/convert_md_win.exe bin/convert_md.exe
          cp artifacts-temp/macos-arm64-bin/convert_md_mac_arm64 bin/convert_md_mac_arm64
          cp artifacts-temp/macos-x86_64-bin/convert_md_mac_x86_64 bin/convert_md_mac_x86_64
          cp artifacts-temp/linux-bin/convert_md_linux bin/convert_md_linux
          
          # Make binaries executable
          chmod +x bin/convert_md_mac_arm64 bin/convert_md_mac_x86_64 bin/convert_md_linux
          
          # Remove Python source/references folder completely
          rm -rf reference
          rm -rf references
          
          # Clean up temporary downloads
          rm -rf artifacts-temp

      - name: Track files with Git LFS
        run: |
          # Set up Git LFS attributes for binaries
          git lfs track "bin/convert_md.exe"
          git lfs track "bin/convert_md_mac_arm64"
          git lfs track "bin/convert_md_mac_x86_64"
          git lfs track "bin/convert_md_linux"
          git add .gitattributes

      - name: Commit and Push to main
        run: |
          git add bin/convert_md.exe bin/convert_md_mac_arm64 bin/convert_md_mac_x86_64 bin/convert_md_linux
          git add -A # Captures deletion of reference/ and references/ folders
          git commit -m "chore: deploy compiled multi-platform binaries and remove python source [skip ci]" || echo "No changes to commit"
          git push origin main
